<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>WalletAppPro</title>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  
  <style>
    :root {
      --bg-main: #0f172a;
      --bg-card: #1e293b;
      --border-color: #334155;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --gain: #22c55e;
      --loss: #ef4444;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--bg-main); color: var(--text-main); padding: 12px; min-height: 100vh; }

    /* Top Navigation */
    .top-controls { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
    @media (min-width: 768px) { .top-controls { flex-direction: row; align-items: center; justify-content: space-between; } }

    .search-bar { background: var(--bg-card); border: 1px solid var(--border-color); color: #fff; padding: 12px 16px; border-radius: 12px; outline: none; width: 100%; max-width: 400px; }
    
    /* Mobil Sıralama Seçici (Sadece Mobilde Görünür) */
    .mobile-sort-ui { display: flex; gap: 8px; margin-bottom: 10px; }
    @media (min-width: 768px) { .mobile-sort-ui { display: none; } }
    
    select.mobile-select { background: var(--bg-card); color: #fff; border: 1px solid var(--border-color); padding: 8px; border-radius: 8px; flex: 1; font-size: 13px; }

    /* Layout */
    .container { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
    @media (min-width: 1024px) { .container { grid-template-columns: 1fr 360px; } }

    /* Metrics */
    .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 24px; }
    @media (min-width: 768px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }
    .metric-card { background: var(--bg-card); padding: 15px; border-radius: 14px; border: 1px solid var(--border-color); }
    .metric-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
    .metric-value { font-size: 18px; font-weight: 800; margin-top: 5px; }

    /* Tables & Cards */
    .card { background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border-color); padding: 16px; margin-bottom: 20px; }
    h3 { margin-bottom: 15px; font-size: 16px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--accent); padding-left: 10px; }

    table { width: 100%; border-collapse: collapse; }
    thead th { text-align: left; padding: 12px; color: var(--text-muted); font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border-color); cursor: pointer; }
    
    /* Mobil Kart Tasarımı */
    @media (max-width: 768px) {
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tbody tr { border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; margin-bottom: 16px; background: rgba(255,255,255,0.02); position: relative; }
      td { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
      td:last-child { border-bottom: none; margin-top: 10px; }
      td::before { content: attr(data-label); font-weight: 500; color: var(--text-muted); font-size: 12px; }
      td.symbol-cell { font-size: 18px; color: var(--accent); font-weight: 700; border-bottom: 1px solid var(--border-color); margin-bottom: 5px; justify-content: flex-start; }
      td.symbol-cell::before { display: none; }
      
      /* Butonları yan yana düzgünce diz */
      .action-group { display: flex; gap: 10px; width: 100%; justify-content: flex-end; }
    }

    /* Buttons & Inputs */
    input[type="number"] { background: #0f172a; border: 1px solid var(--border-color); color: #fff; padding: 8px; border-radius: 8px; width: 100px; text-align: right; }
    .btn { padding: 10px 14px; border-radius: 8px; cursor: pointer; border: none; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; font-size: 13px; transition: 0.2s; }
    .btn-update { background: var(--gain); color: #fff; }
    .btn-del { background: var(--loss); color: #fff; }
    .btn-icon { background: rgba(255,255,255,0.05); color: var(--text-main); padding: 8px; }
    .btn-primary { background: var(--accent); color: #0f172a; width: 100%; justify-content: center; margin-top: 10px; }

    .positive { color: var(--gain); }
    .negative { color: var(--loss); }
    .text-right { text-align: right; }
    .chart-box { height: 250px; position: relative; }
  </style>
</head>
<body>

  <div class="top-controls">
    <h1>WalletAppPro</h1>
    <input type="text" id="globalSearch" class="search-bar" placeholder="Sembol veya isim ara...">
  </div>

  <div class="mobile-sort-ui">
    <select id="mobileSortKey" class="mobile-select" onchange="applyMobileSort()">
      <option value="symbol">Sırala: Sembol</option>
      <option value="pl">Sırala: Kar / Zarar</option>
      <option value="value">Sırala: Toplam Değer</option>
      <option value="amount">Sırala: Miktar</option>
    </select>
    <button class="btn btn-icon" onclick="toggleSortDirection()"><i data-feather="repeat"></i></button>
  </div>

  <div class="summary-grid">
    <div class="metric-card"><div class="metric-label">Portföy</div><div id="totalValue" class="metric-value">—</div></div>
    <div class="metric-card"><div class="metric-label">Maliyet</div><div id="totalCost" class="metric-value">—</div></div>
    <div class="metric-card"><div class="metric-label">Net K/Z</div><div id="totalPL" class="metric-value">—</div></div>
    <div class="metric-card"><div class="metric-label">Verim</div><div id="totalPct" class="metric-value">—</div></div>
  </div>

  <div class="container">
    <main id="tables-wrapper"></main>

    <aside>
      <div class="card">
        <button class="btn btn-primary" id="refreshPrices"><i data-feather="refresh-cw"></i> Fiyatları Güncelle</button>
        <p id="status" style="font-size:11px; text-align:center; margin-top:10px; color:var(--accent);">Sistem Hazır</p>
      </div>
    </aside>
  </div>

  <script>
    const STORAGE_KEY = 'ugur_portfolio_v3';
    const FINNHUB_KEY = 'c94i99aad3if4j50rvn0';
    
    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
      tefas: [{symbol:"GNS", amount:12260, avgPrice:1.29}],
      us: [{symbol:"NVDA", amount:2, avgPrice:140}],
      silver: [{symbol:"GRAMGUMUS", amount:100, avgPrice:113}],
      prices: {}
    };

    let sortConfig = { key: 'symbol', direction: 'asc', table: null };

    const fmt = (n, d=2) => Number(n).toLocaleString('tr-TR', {minimumFractionDigits:d, maximumFractionDigits:d});

    function init() {
      renderTables();
      updateMetrics();
      feather.replace();
      document.getElementById('globalSearch').oninput = renderTables;
      document.getElementById('refreshPrices').onclick = fetchPrices;
    }

    function renderTables() {
      const wrapper = document.getElementById('tables-wrapper');
      wrapper.innerHTML = '';
      const searchTerm = document.getElementById('globalSearch').value.toLowerCase();

      ['tefas', 'us', 'silver'].forEach(key => {
        let data = state[key].map((item, idx) => {
          const price = state.prices[item.symbol] || 0;
          const value = item.amount * price;
          const cost = item.amount * item.avgPrice;
          const pl = value - cost;
          return { ...item, idx, price, value, cost, pl };
        });

        if(searchTerm) data = data.filter(d => d.symbol.toLowerCase().includes(searchTerm));

        // Sıralama Uygula
        data.sort((a, b) => {
          let vA = a[sortConfig.key], vB = b[sortConfig.key];
          return sortConfig.direction === 'asc' ? (vA > vB ? 1 : -1) : (vA < vB ? 1 : -1);
        });

        let html = `<div class="card"><h3>${key.toUpperCase()} <button class="btn btn-icon" onclick="addRow('${key}')"><i data-feather="plus"></i></button></h3><table><thead><tr>
          <th onclick="setSort('${key}', 'symbol')">Varlık</th>
          <th onclick="setSort('${key}', 'amount')">Miktar</th>
          <th onclick="setSort('${key}', 'pl')">K/Z</th>
          <th>İşlem</th>
        </tr></thead><tbody>`;

        data.forEach(item => {
          html += `<tr>
            <td class="symbol-cell">${item.symbol}</td>
            <td data-label="Miktar"><input type="number" id="i-amt-${key}-${item.idx}" value="${item.amount}"></td>
            <td data-label="Maliyet"><input type="number" id="i-cost-${key}-${item.idx}" value="${item.avgPrice}"></td>
            <td data-label="Fiyat">${fmt(item.price)}</td>
            <td data-label="K/Z" class="${item.pl >= 0 ? 'positive' : 'negative'}">${fmt(item.pl, 0)}</td>
            <td>
              <div class="action-group">
                <button class="btn btn-update" onclick="updateRow('${key}', ${item.idx})"><i data-feather="check"></i></button>
                <button class="btn btn-del" onclick="deleteRow('${key}', ${item.idx})"><i data-feather="trash-2"></i></button>
              </div>
            </td>
          </tr>`;
        });
        html += `</tbody></table></div>`;
        wrapper.innerHTML += html;
      });
      feather.replace();
    }

    // Mobil Sıralama Fonksiyonları
    function applyMobileSort() {
      sortConfig.key = document.getElementById('mobileSortKey').value;
      renderTables();
    }
    function toggleSortDirection() {
      sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
      renderTables();
    }

    function setSort(table, key) {
      sortConfig.key = key;
      sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
      renderTables();
    }

    function updateRow(key, idx) {
      state[key][idx].amount = parseFloat(document.getElementById(`i-amt-${key}-${idx}`).value) || 0;
      state[key][idx].avgPrice = parseFloat(document.getElementById(`i-cost-${key}-${idx}`).value) || 0;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      updateMetrics();
      renderTables();
    }

    function deleteRow(key, idx) {
      if(confirm("Silinsin mi?")) {
        state[key].splice(idx, 1);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        renderTables();
        updateMetrics();
      }
    }

    function addRow(key) {
      const s = prompt("Sembol:");
      if(s) {
        state[key].push({ symbol: s.toUpperCase(), amount: 0, avgPrice: 0 });
        renderTables();
      }
    }

    // Grafik ve Metrik Fonksiyonları (Öncekiyle aynı ama stabilize edilmiş)
    function updateMetrics() {
      let tc = 0, tv = 0;
      ['tefas','us','silver'].forEach(k => {
        state[k].forEach(i => {
          const p = state.prices[i.symbol] || 0;
          tc += (i.amount * i.avgPrice);
          tv += (i.amount * p);
        });
      });
      document.getElementById('totalValue').textContent = fmt(tv, 0) + " ₺";
      document.getElementById('totalCost').textContent = fmt(tc, 0) + " ₺";
      const pl = tv - tc;
      document.getElementById('totalPL').textContent = fmt(pl, 0) + " ₺";
      document.getElementById('totalPL').className = 'metric-value ' + (pl >= 0 ? 'positive' : 'negative');
      document.getElementById('totalPct').textContent = '%' + (tc > 0 ? fmt((pl/tc)*100) : '0');
    }

    async function fetchPrices() {
      document.getElementById('status').textContent = "Güncelleniyor...";
      const now = Math.floor(Date.now()/1000);
      for(const k of ['tefas','us','silver']) {
        for(const i of state[k]) {
          try {
            const url = k === 'us' ? `https://finnhub.io/api/v1/quote?symbol=${i.symbol}&token=${FINNHUB_KEY}` : `https://gate.fintables.com/barbar/udf/history?symbol=${i.symbol}&resolution=D&from=1734210000&to=${now}`;
            const res = await fetch(url); const d = await res.json();
            state.prices[i.symbol] = k === 'us' ? d.c : (d.c?.at(-1) || d.c);
          } catch(e) {}
        }
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      renderTables(); updateMetrics();
      document.getElementById('status').textContent = "Tamamlandı: " + new Date().toLocaleTimeString();
    }

    init();
  </script>
</body>
</html>
