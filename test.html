<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fintables • Alpha Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ═══════════════════════ TOKENS ═══════════════════════ */
:root {
  --bg:      #080a0e;
  --surf:    #0e1118;
  --surf2:   #141923;
  --border:  #1d2535;
  --border2: #263040;
  --text:    #dce6f5;
  --muted:   #4a6080;
  --green:   #00d68f;
  --red:     #ff4560;
  --amber:   #ffb700;
  --blue:    #4c9eff;
  --purple:  #a78bfa;
  --fn:      'JetBrains Mono', monospace;
  --fd:      'Syne', sans-serif;
}

/* ═══════════════════════ RESET ═══════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--fn);
  font-size: 12px;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-y: scroll;
}

/* ═══════════════════════ GRID BG ═══════════════════════ */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(76,158,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(76,158,255,0.025) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ═══════════════════════ HEADER ═══════════════════════ */
.hdr {
  position: sticky; top: 0; z-index: 200;
  background: rgba(8,10,14,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.hdr-inner {
  max-width: 1440px; margin: auto; padding: 0 24px; height: 60px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.logo-mark {
  width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
  background: linear-gradient(135deg, #4c9eff, #7c3aed);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px rgba(76,158,255,0.35);
}
.logo-name { font-family: var(--fd); font-size: 17px; font-weight: 800; letter-spacing: -0.3px; color: var(--text); }
.logo-sub  { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

.live-pill {
  display: flex; align-items: center; gap: 6px;
  background: rgba(0,214,143,0.08); border: 1px solid rgba(0,214,143,0.25);
  border-radius: 999px; padding: 5px 12px; font-size: 11px; color: #00d68f;
}
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: #00d68f; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,214,143,.4)} 50%{opacity:.5;box-shadow:0 0 0 4px rgba(0,214,143,0)} }

.hdr-btn {
  display: flex; align-items: center; gap: 7px;
  background: var(--surf2); border: 1px solid var(--border2);
  border-radius: 8px; padding: 7px 14px; cursor: pointer;
  font-size: 11px; color: var(--text); font-family: var(--fn);
  transition: all .2s;
}
.hdr-btn:hover { border-color: var(--blue); color: var(--blue); }

/* ═══════════════════════ MAIN ═══════════════════════ */
.main { max-width: 1440px; margin: auto; padding: 24px; position: relative; z-index: 1; }

.sec-lbl {
  font-family: var(--fd); font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 2px;
  display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
}
.sec-lbl::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ═══════════════════════ STAT CARDS ═══════════════════════ */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 28px; }
.stat-card {
  background: var(--surf); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px 18px; position: relative; overflow: hidden;
}
.stat-kl  { font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
.stat-val { font-family: var(--fd); font-size: 28px; font-weight: 800; line-height: 1; }
.stat-sub { font-size: 10px; color: var(--muted); margin-top: 6px; }

/* ═══════════════════════ SLIDER ═══════════════════════ */
.slider { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; margin-bottom: 28px; }
.slider::-webkit-scrollbar { display: none; }
.pick-card {
  flex: 0 0 220px;
  background: var(--surf); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; position: relative; transition: all .2s; cursor: pointer;
}
.pick-card:hover { transform: translateY(-3px); border-color: var(--blue); }
.pick-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--blue), var(--purple)); }
.pick-sym { font-family: var(--fd); font-size: 20px; font-weight: 800; color: var(--text); }

/* ═══════════════════════ TABLE ═══════════════════════ */
.tbl-panel { background: var(--surf); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.tbl-toolbar { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
.tbl-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 900px; }
thead th {
  font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
  padding: 12px 14px; background: #0b0d12; border-bottom: 1px solid var(--border);
  text-align: left; cursor: pointer;
}
tbody tr { border-bottom: 1px solid rgba(29,37,53,0.5); transition: background .1s; }
tbody tr:hover { background: rgba(20,25,35,0.7); }
tbody td { padding: 12px 14px; white-space: nowrap; }

.bp { font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 4px; display: inline-flex; }
.bp-al { background: rgba(0,214,143,0.1); color: var(--green); border: 1px solid rgba(0,214,143,0.2); }
.bp-gal { background: rgba(0,214,143,0.2); color: var(--green); border: 1px solid var(--green); }
.bp-sat { background: rgba(255,69,96,0.1); color: var(--red); border: 1px solid rgba(255,69,96,0.2); }
.bp-tut { background: rgba(255,183,0,0.1); color: var(--amber); border: 1px solid rgba(255,183,0,0.2); }

#loading-overlay {
  position: fixed; inset: 0; z-index: 9999; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
}
#loading-overlay.hidden { display: none; }
.ld-ring { width: 30px; height: 30px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal-box { background: var(--surf); border: 1px solid var(--border); border-radius: 12px; padding: 30px; max-width: 500px; width: 90%; }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="ld-ring"></div>
  <div style="font-size: 10px; letter-spacing: 2px; color: var(--muted);">ALPHA ENGINE INITIALIZING...</div>
</div>

<header class="hdr">
  <div class="hdr-inner">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="logo-mark"><i class="fa-solid fa-bolt" style="color:#fff"></i></div>
      <div>
        <div class="logo-name">Fintables Alpha</div>
        <div class="logo-sub">Strategic Trading Terminal</div>
      </div>
    </div>
    <div style="display:flex; gap:10px">
      <div class="live-pill hide-sm">
        <div class="live-dot"></div>
        <span id="total-count">0</span> Öneri
      </div>
      <button class="hdr-btn" onclick="refreshData()">
        <i id="sync-icon" class="fa-solid fa-rotate"></i> <span>Yenile</span>
      </button>
    </div>
  </div>
</header>

<main class="main">
  <div class="stat-grid" id="stat-grid"></div>

  <div class="sec-lbl" style="color:var(--blue)">
    <i class="fa-solid fa-fire" style="color:var(--amber)"></i> Alpha Picks — En Yüksek Potansiyel
  </div>
  <div class="slider" id="alpha-slider"></div>

  <div class="tbl-panel">
    <div class="tbl-toolbar">
      <div style="font-family:var(--fd); font-weight:700">Sinyal Tarama</div>
      <input type="text" id="search" placeholder="Hisse ara..." style="background:var(--bg); border:1px solid var(--border); color:white; padding:6px 12px; border-radius:6px; font-family:var(--fn); font-size:11px;" oninput="renderTable()">
    </div>
    <div class="tbl-scroll">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('code')">Sembol</th>
            <th>Sinyal</th>
            <th onclick="sortBy('alpha')">Alpha</th>
            <th onclick="sortBy('twc')">Conviction</th>
            <th onclick="sortBy('upside')">Upside %</th>
            <th onclick="sortBy('momentum')">Mom.</th>
            <th onclick="sortBy('n')">Kurum</th>
            <th>Sektör</th>
          </tr>
        </thead>
        <tbody id="main-tbody"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
const HEX = { green: '#00d68f', red: '#ff4560', amber: '#ffb700', blue: '#4c9eff', muted: '#4a6080' };
const SECTOR_MAP = { 'THYAO':'Ulaştırma', 'PGSUS':'Ulaştırma', 'AKBNK':'Bankacılık', 'GARAN':'Bankacılık', 'ASELS':'Savunma', 'TUPRS':'Enerji', 'KCHOL':'Holding' };
const TYPE_SCORE = { al: 3, tut: 1, sat: -4 };
const DECAY = Math.LN2 / 28;

let stocks = [];
let rawData = [];
let sortKey = 'alpha';
let sortAsc = false;

function mean(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }
function normalize(v, min, max) { return max === min ? 0.5 : Math.max(0, Math.min(1, (v - min) / (max - min))); }

async function fetchData() {
  try {
    const res = await fetch('https://api.fintables.com/analyst-ratings/?brokerage_id=&code=&in_model_portfolio=');
    const data = await res.json();
    return data.results || data || [];
  } catch(e) {
    console.warn("API Error, demo verisi kullanılıyor.");
    return []; // Gerçek senaryoda buraya demo verisi eklenebilir.
  }
}

function processData(results) {
  const agg = {};
  results.forEach(it => {
    if(!agg[it.code]) agg[it.code] = { code: it.code, items: [], current: Number(it.current_price) || 0 };
    agg[it.code].items.push(it);
  });

  const processed = Object.values(agg).map(g => {
    let sumW = 0, sumWS = 0, targets = [];
    let recentScores = [], olderScores = [];
    const now = Date.now();

    g.items.forEach(it => {
      const days = Math.max(0, (now - new Date(it.published_at)) / 86400000);
      const w = Math.exp(-DECAY * days);
      const score = TYPE_SCORE[it.type] || 0;
      sumW += w; sumWS += w * score;
      if(it.price_target) targets.push(Number(it.price_target));
      if(days <= 14) recentScores.push(score); else if(days <= 60) olderScores.push(score);
    });

    const avgT = mean(targets);
    const upside = g.current > 0 ? ((avgT - g.current) / g.current) * 100 : 0;
    const twc = (sumW > 0 ? sumWS / sumW : 0) * (1 + Math.log10(g.items.length + 1));
    const mom = recentScores.length && olderScores.length ? mean(recentScores) - mean(olderScores) : 0;

    return { 
      code: g.code, twc, upside, momentum: mom, n: g.items.length, 
      sector: SECTOR_MAP[g.code] || 'Diğer', alpha: 0 
    };
  });

  // Alpha normalizasyonu
  const ups = processed.map(s => s.upside), twcs = processed.map(s => s.twc);
  const minUp = Math.min(...ups), maxUp = Math.max(...ups);
  const minTwc = Math.min(...twcs), maxTwc = Math.max(...twcs);

  processed.forEach(s => {
    const nUp = normalize(s.upside, minUp, maxUp);
    const nTwc = normalize(s.twc, minTwc, maxTwc);
    s.alpha = Math.round((nUp * 0.5 + nTwc * 0.5) * 100);
  });

  return processed;
}

function getSignal(s) {
  const reliable = s.n >= 2;
  if (s.alpha >= 70 && s.upside >= 15 && reliable) return { label: 'GÜÇLÜ AL', cls: 'bp-gal' };
  if (s.alpha >= 45 && s.upside >= 5) return { label: 'AL', cls: 'bp-al' };
  if (s.twc <= -1 || s.upside <= -5) return { label: 'SAT', cls: 'bp-sat' };
  return { label: 'TUT', cls: 'bp-tut' };
}

function renderTable() {
  const term = document.getElementById('search').value.toLowerCase();
  const filtered = stocks.filter(s => s.code.toLowerCase().includes(term));
  
  filtered.sort((a,b) => {
    let v1 = a[sortKey], v2 = b[sortKey];
    return sortAsc ? (v1 > v2 ? 1 : -1) : (v1 < v2 ? 1 : -1);
  });

  document.getElementById('main-tbody').innerHTML = filtered.map(s => {
    const sig = getSignal(s);
    return `<tr>
      <td style="font-weight:700">${s.code}</td>
      <td><span class="bp ${sig.cls}">${sig.label}</span></td>
      <td style="color:var(--purple); font-weight:700">${s.alpha}</td>
      <td style="color:${s.twc > 0 ? HEX.green : HEX.red}">${s.twc.toFixed(2)}</td>
      <td style="color:${s.upside > 0 ? HEX.green : HEX.red}">%${s.upside.toFixed(1)}</td>
      <td>${s.momentum.toFixed(1)}</td>
      <td>${s.n}</td>
      <td style="color:var(--muted); font-size:10px">${s.sector}</td>
    </tr>`;
  }).join('');
}

function renderSlider() {
  const top = [...stocks].sort((a,b) => b.alpha - a.alpha).slice(0, 5);
  document.getElementById('alpha-slider').innerHTML = top.map(s => `
    <div class="pick-card">
      <div style="font-size:9px; color:var(--muted); margin-bottom:4px">ALPHA PICK</div>
      <div class="pick-sym">${s.code}</div>
      <div style="color:var(--green); font-weight:700; margin:8px 0">%${s.upside.toFixed(1)} Upside</div>
      <div style="font-size:10px; color:var(--muted)">Skor: <span style="color:white">${s.alpha}</span></div>
    </div>
  `).join('');
}

function updateStats() {
  const avgUp = mean(stocks.map(s => s.upside));
  document.getElementById('stat-grid').innerHTML = `
    <div class="stat-card"><div class="stat-kl">Taranan</div><div class="stat-val">${stocks.length}</div></div>
    <div class="stat-card"><div class="stat-kl">Piyasa Upside</div><div class="stat-val" style="color:var(--green)">%${avgUp.toFixed(1)}</div></div>
    <div class="stat-card"><div class="stat-kl">Durum</div><div class="stat-val" style="color:var(--blue)">AKTİF</div></div>
  `;
}

async function refreshData() {
  document.getElementById('sync-icon').classList.add('fa-spin');
  const raw = await fetchData();
  if(raw.length > 0) {
    stocks = processData(raw);
    renderSlider();
    renderTable();
    updateStats();
    document.getElementById('total-count').textContent = raw.length;
  }
  document.getElementById('sync-icon').classList.remove('fa-spin');
  document.getElementById('loading-overlay').classList.add('hidden');
}

function sortBy(key) {
  if(sortKey === key) sortAsc = !sortAsc; else { sortKey = key; sortAsc = false; }
  renderTable();
}

window.onload = refreshData;
</script>
</body>
</html>
