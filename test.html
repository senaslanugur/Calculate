<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fintables • Kantitatif Analist Paneli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ═══════════════════════════════════════════════════════
   DESIGN TOKENS & MODERN DARK THEME
   ═══════════════════════════════════════════════════════ */
:root {
  --c-bg:      #0a0a0c;
  --c-surf:    #121217;
  --c-surf2:   #1c1c24;
  --c-border:  #2a2a35;
  --c-text:    #f3f4f6;
  --c-muted:   #8b949e;
  --c-green:   #10b981;
  --c-red:     #ef4444;
  --c-amber:   #f59e0b;
  --c-blue:    #3b82f6;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  font-size: 13px; line-height: 1.5;
  background-color: var(--c-bg); color: var(--c-text);
  min-height: 100vh; overflow-y: scroll;
}

/* ─── HEADER ─── */
.hdr { 
  background: rgba(18, 18, 23, 0.8); backdrop-filter: blur(12px); 
  border-bottom: 1px solid var(--c-border); position: sticky; top: 0; z-index: 100; 
}
.hdr-inner {
  max-width: 1400px; margin: auto; padding: 0 24px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo-icon {
  width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--c-blue), #1d4ed8);
  display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.logo-name { font-size: 16px; font-weight: 700; letter-spacing: -0.5px; }
.logo-sub  { font-size: 10px; color: var(--c-muted); font-family: var(--font-mono); letter-spacing: 0.5px; }

/* ─── CONTROLS ─── */
.btn, .sel, .srch-inp {
  background: var(--c-surf2); border: 1px solid var(--c-border); color: var(--c-text);
  border-radius: 6px; padding: 6px 12px; font-size: 12px; font-family: var(--font-sans);
  transition: all 0.2s; outline: none; cursor: pointer;
}
.btn:hover, .sel:hover, .srch-inp:focus { border-color: var(--c-blue); }
.srch-inp { cursor: text; padding-left: 28px; width: 220px; }
.srch-wrap { position: relative; }
.srch-wrap i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--c-muted); font-size: 11px; }

/* ─── MAIN & GRIDS ─── */
.main { max-width: 1400px; margin: auto; padding: 24px; }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
.stat-card { 
  background: var(--c-surf); border: 1px solid var(--c-border); 
  border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
}
.stat-lbl { font-size: 11px; color: var(--c-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
.stat-val { font-size: 28px; font-weight: 700; letter-spacing: -1px; font-family: var(--font-mono); }

/* ─── TABLES ─── */
.tbl-panel { 
  background: var(--c-surf); border: 1px solid var(--c-border); 
  border-radius: 12px; margin-bottom: 24px; overflow: hidden;
}
.tbl-toolbar { padding: 16px 20px; border-bottom: 1px solid var(--c-border); display: flex; gap: 12px; flex-wrap: wrap; justify-content: space-between; align-items: center;}
table { width: 100%; border-collapse: collapse; text-align: left; }
thead th { 
  font-size: 10px; text-transform: uppercase; color: var(--c-muted); 
  padding: 12px 20px; background: rgba(28, 28, 36, 0.4); border-bottom: 1px solid var(--c-border); 
  font-weight: 600; letter-spacing: 0.5px;
}
tbody tr { border-bottom: 1px solid rgba(42, 42, 53, 0.5); transition: background 0.15s; }
tbody tr:hover { background: rgba(255,255,255,0.02); }
tbody td { padding: 12px 20px; font-size: 13px; white-space: nowrap; }
.td-mono { font-family: var(--font-mono); }

/* ─── BADGES & INDICATORS ─── */
.badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; font-family: var(--font-mono); }
.b-green { background: rgba(16,185,129,0.15); color: var(--c-green); }
.b-red { background: rgba(239,68,68,0.15); color: var(--c-red); }
.b-amber { background: rgba(245,158,11,0.15); color: var(--c-amber); }
.b-blue { background: rgba(59,130,246,0.15); color: var(--c-blue); border: 1px solid rgba(59,130,246,0.3); }

/* Toggle Switch */
.switch-wrapper { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; color: var(--c-text); cursor: pointer;}
.switch { position: relative; width: 34px; height: 20px; background: var(--c-surf2); border: 1px solid var(--c-border); border-radius: 20px; transition: 0.3s;}
.switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: var(--c-muted); border-radius: 50%; transition: 0.3s;}
input:checked + .switch { background: var(--c-blue); border-color: var(--c-blue); }
input:checked + .switch::after { left: 16px; background: #fff; }

.text-g { color: var(--c-green); } .text-r { color: var(--c-red); } .text-m { color: var(--c-muted); }
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-inner">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="logo-icon"><i class="fa-solid fa-layer-group" style="color:#fff"></i></div>
      <div>
        <div class="logo-name">Fintables Quant</div>
        <div class="logo-sub">GELİŞMİŞ ANALİST PANELİ v3</div>
      </div>
    </div>
    <div style="display:flex; gap:10px;">
      <button class="btn" onclick="fetchAndProcess()"><i class="fa-solid fa-bolt text-m"></i> Modeli Çalıştır</button>
    </div>
  </div>
</header>

<main class="main">
  <div class="stat-grid" id="stat-grid">
    </div>

  <div class="tbl-panel">
    <div class="tbl-toolbar">
      <div style="font-weight:600; display:flex; align-items:center; gap:8px;">
        <i class="fa-solid fa-radar" style="color:var(--c-blue)"></i> Kantitatif Skorlama & Konsensüs
      </div>
      <div style="display:flex; gap:12px; flex-wrap:wrap;">
        <div class="srch-wrap">
          <i class="fa-solid fa-search"></i>
          <input type="text" id="search" class="srch-inp" placeholder="Hisse veya Sektör..." oninput="renderTable()">
        </div>
        <select class="sel" id="sector-filter" onchange="renderTable()">
          <option value="">Tüm Sektörler</option>
        </select>
        <label class="switch-wrapper">
          <input type="checkbox" id="model-port-filter" style="display:none" onchange="renderTable()">
          <div class="switch"></div> Model Portföyler
        </label>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>Sembol</th>
            <th>Sektör</th>
            <th>Zamanlı Skor</th>
            <th>Hedef Pot.</th>
            <th>Momentum (1A)</th>
            <th>Volatilite</th>
            <th>Conviction</th>
            <th>Nötr Z-Skor</th>
          </tr>
        </thead>
        <tbody id="quant-tbody">
          <tr><td colspan="8" style="text-align:center; padding: 40px; color:var(--c-muted);">Veriler hesaplanıyor, lütfen bekleyin...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script>
/**
 * Fintables Quant Engine v3
 */

// Sektör verisi API'de olmadığından BIST için örnek bir mapping kullanıyoruz.
const SECTOR_MAP = {
  'THYAO':'Ulaştırma', 'PGSUS':'Ulaştırma', 
  'AKBNK':'Bankacılık', 'GARAN':'Bankacılık', 'ISCTR':'Bankacılık', 'YKBNK':'Bankacılık',
  'TUPRS':'Sanayi', 'EREGL':'Sanayi', 'KRDMD':'Sanayi', 'PETKM':'Sanayi', 'FROTO':'Otomotiv', 'TOASO':'Otomotiv',
  'ASELS':'Teknoloji', 'BIMAS':'Perakende', 'MGROS':'Perakende', 'SAHOL':'Holding', 'KCHOL':'Holding'
};

const DEMO_RATINGS = [
  { code: 'THYAO', type: 'al', price_target: 440, current_price: 360, published_at: new Date(Date.now() - 5*86400000).toISOString(), in_model_portfolio: true },
  { code: 'THYAO', type: 'al', price_target: 420, current_price: 360, published_at: new Date(Date.now() - 40*86400000).toISOString(), in_model_portfolio: false },
  { code: 'AKBNK', type: 'al', price_target: 75, current_price: 57, published_at: new Date(Date.now() - 2*86400000).toISOString(), in_model_portfolio: true },
  { code: 'AKBNK', type: 'tut', price_target: 60, current_price: 57, published_at: new Date(Date.now() - 15*86400000).toISOString(), in_model_portfolio: false },
  { code: 'TUPRS', type: 'sat', price_target: 190, current_price: 225, published_at: new Date(Date.now() - 10*86400000).toISOString(), in_model_portfolio: false },
  { code: 'FROTO', type: 'al', price_target: 1500, current_price: 1190, published_at: new Date(Date.now() - 3*86400000).toISOString(), in_model_portfolio: true },
  { code: 'BIMAS', type: 'tut', price_target: 600, current_price: 570, published_at: new Date(Date.now() - 20*86400000).toISOString(), in_model_portfolio: false }
];

let globalStocks = [];
let globalSectors = {};

// 1. Zaman Ağırlığı Hesaplama (Exponential Decay)
function getTimeWeight(dateString) {
  const ageDays = (Date.now() - new Date(dateString).getTime()) / (1000 * 60 * 60 * 24);
  const lambda = 0.023; // Yaklaşık 30 günde 0.5'e düşürür
  return Math.max(0.2, Math.exp(-lambda * ageDays));
}

// 2. Geçmiş Veri (Momentum & Volatilite) Çekimi
async function fetchPriceHistory(symbol) {
  const to = Math.floor(Date.now() / 1000);
  const from = to - (30 * 86400); // Son 30 gün
  const url = `https://gate.fintables.com/barbar/udf/history?symbol=${encodeURIComponent(symbol)}&resolution=D&from=${from}&to=${to}`;
  
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.s === 'ok' && data.c.length > 0) {
      const closes = data.c;
      const startPrice = closes[0];
      const endPrice = closes[closes.length - 1];
      const momentum = ((endPrice - startPrice) / startPrice) * 100;
      
      // Volatilite hesaplama (Günlük getirilerin standart sapması)
      let returns = [];
      for(let i=1; i<closes.length; i++) {
        returns.push((closes[i] - closes[i-1]) / closes[i-1]);
      }
      const meanReturn = returns.reduce((a,b)=>a+b,0) / returns.length;
      const variance = returns.reduce((sum, r) => sum + Math.pow(r - meanReturn, 2), 0) / returns.length;
      const volatility = Math.sqrt(variance) * Math.sqrt(252) * 100; // Yıllıklandırılmış % volatilite

      return { momentum, volatility };
    }
  } catch (e) {
    console.warn(`${symbol} UDF verisi alınamadı, simüle ediliyor.`);
  }
  // Fallback / Simülasyon
  return { 
    momentum: (Math.random() * 20 - 10), 
    volatility: (Math.random() * 30 + 15) 
  };
}

async function fetchAndProcess() {
  document.getElementById('quant-tbody').innerHTML = '<tr><td colspan="8" style="text-align:center; padding: 40px; color:var(--c-muted);"><i class="fa-solid fa-circle-notch fa-spin"></i> Algoritmalar çalışıyor...</td></tr>';
  
  const ratings = DEMO_RATINGS; // Normalde ana API'den fetch edilir
  const aggregated = {};
  const sectorsSet = new Set();

  for (const r of ratings) {
    if (!aggregated[r.code]) {
      aggregated[r.code] = {
        code: r.code,
        sector: SECTOR_MAP[r.code] || 'Diğer',
        rawScore: 0,
        weightedScore: 0,
        targets: [],
        currentPrice: r.current_price,
        inModelPort: false,
        count: 0
      };
    }
    const stock = aggregated[r.code];
    sectorsSet.add(stock.sector);
    
    // Model Portföy Flag
    if(r.in_model_portfolio) stock.inModelPort = true;
    
    // Ağırlıklı Puanlama (Zaman etkisi)
    let baseVal = r.type === 'al' ? 3 : (r.type === 'sat' ? -4 : 1);
    const weight = getTimeWeight(r.published_at);
    stock.rawScore += baseVal;
    stock.weightedScore += (baseVal * weight);
    
    if(r.price_target) stock.targets.push(r.price_target);
    stock.count++;
  }

  // UDF API ile metrikleri zenginleştirme
  globalStocks = [];
  globalSectors = {};

  for (const code of Object.keys(aggregated)) {
    const stock = aggregated[code];
    const metrics = await fetchPriceHistory(code);
    
    const avgTarget = stock.targets.reduce((a,b)=>a+b,0) / stock.targets.length;
    stock.upside = ((avgTarget - stock.currentPrice) / stock.currentPrice) * 100;
    stock.momentum = metrics.momentum;
    stock.volatility = metrics.volatility;
    
    // Conviction = (Ağırlıklı Skor * Kurum Çarpanı) / (1 + Volatilite Cezası)
    const coverageMultiplier = 1 + Math.log10(stock.count + 1);
    const volPenalty = 1 + (stock.volatility / 100); 
    stock.conviction = (stock.weightedScore * coverageMultiplier) / volPenalty;

    // Sektör verisi hazırlığı (Sektör Z-Skoru için ortalama ve sapma hesaplanacak)
    if(!globalSectors[stock.sector]) globalSectors[stock.sector] = [];
    globalSectors[stock.sector].push(stock.conviction);

    globalStocks.push(stock);
  }

  // Sektör İstatistikleri ve Z-Skor Hesabı
  for (const s in globalSectors) {
    const arr = globalSectors[s];
    const mean = arr.reduce((a,b)=>a+b,0) / arr.length;
    const stdDev = Math.sqrt(arr.reduce((sq, val) => sq + Math.pow(val - mean, 2), 0) / (arr.length||1)) || 1;
    globalSectors[s] = { mean, stdDev };
  }

  globalStocks.forEach(st => {
    const secStats = globalSectors[st.sector];
    st.zScore = (st.conviction - secStats.mean) / secStats.stdDev;
  });

  // Filtre UI'ı doldur
  const secFilter = document.getElementById('sector-filter');
  secFilter.innerHTML = '<option value="">Tüm Sektörler</option>';
  sectorsSet.forEach(s => secFilter.innerHTML += `<option value="${s}">${s}</option>`);

  updateTopCards();
  renderTable();
}

function renderTable() {
  const term = document.getElementById('search').value.toLowerCase();
  const sec = document.getElementById('sector-filter').value;
  const isModelOnly = document.getElementById('model-port-filter').checked;

  const filtered = globalStocks.filter(st => {
    const matchTerm = st.code.toLowerCase().includes(term) || st.sector.toLowerCase().includes(term);
    const matchSec = sec === "" || st.sector === sec;
    const matchModel = isModelOnly ? st.inModelPort : true;
    return matchTerm && matchSec && matchModel;
  }).sort((a,b) => b.conviction - a.conviction); // Conviction'a göre sırala

  const tbody = document.getElementById('quant-tbody');
  
  if(filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--c-muted);padding:20px;">Kriterlere uygun hisse bulunamadı.</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(st => {
    const fmt = n => n.toFixed(1);
    const zColor = st.zScore > 0 ? 'text-g' : (st.zScore < 0 ? 'text-r' : 'text-m');
    const uColor = st.upside > 0 ? 'text-g' : 'text-r';
    const mColor = st.momentum > 0 ? 'text-g' : 'text-r';
    
    return `<tr>
      <td class="td-mono" style="font-weight:700; color:var(--c-text);">
        ${st.code} ${st.inModelPort ? '<span class="badge b-blue" style="margin-left:6px" title="Model Portföy"><i class="fa-solid fa-star"></i> MP</span>' : ''}
      </td>
      <td style="color:var(--c-muted)">${st.sector}</td>
      <td class="td-mono">${fmt(st.weightedScore)}</td>
      <td class="td-mono ${uColor}">%${fmt(st.upside)}</td>
      <td class="td-mono ${mColor}">%${fmt(st.momentum)}</td>
      <td class="td-mono text-m">%${fmt(st.volatility)}</td>
      <td class="td-mono" style="font-weight:700; color:var(--c-amber)">${fmt(st.conviction)}</td>
      <td class="td-mono ${zColor}">${st.zScore > 0 ? '+':''}${fmt(st.zScore)}</td>
    </tr>`;
  }).join('');
}

function updateTopCards() {
  const grid = document.getElementById('stat-grid');
  const total = globalStocks.length;
  const inModel = globalStocks.filter(s => s.inModelPort).length;
  const avgUp = globalStocks.reduce((a,b)=>a+b.upside,0) / (total||1);
  
  grid.innerHTML = `
    <div class="stat-card">
      <div class="stat-lbl">Kapsamdaki Hisse</div>
      <div class="stat-val text-m">${total}</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">Ortalama Potansiyel</div>
      <div class="stat-val ${avgUp > 0 ? 'text-g' : 'text-r'}">%${avgUp.toFixed(1)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">Model Portföyde</div>
      <div class="stat-val" style="color:var(--c-blue)">${inModel}</div>
    </div>
  `;
}

// Başlangıç
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', fetchAndProcess);
} else {
  fetchAndProcess();
}
</script>
</body>
</html>
